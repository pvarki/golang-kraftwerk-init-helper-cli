name: "Setup Go"
description: "Install Go and download module dependencies"

inputs:
  go-version:
    description: "Go version to use (e.g. '1.23'). If empty, reads from go.mod."
    required: false
    default: ""
  working-directory:
    description: "Directory containing go.mod / go.sum"
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ${{ inputs.working-directory }}/go.mod
        cache: true
        cache-dependency-path: ${{ inputs.working-directory }}/go.sum

    - name: Download dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        go mod download
        go mod verify
