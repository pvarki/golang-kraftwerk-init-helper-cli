on:
  pull_request:

jobs:
  version-check:
    name: Check version increment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pvarki/config-ci-library/.github/actions/validate-bumpversion@main

  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: pvarki/config-ci-library/.github/actions/setup-golang@main
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1
      - name: Install prek
        id: install_prek
        run: |
          pipx install prek
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Do pre-commit checks
        id: prek
        run: |
          prek run --all-files

  publish:
    needs: [version-check, pre-commit]
    runs-on: ubuntu-latest # arc-runner-set
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Publish Docker image
        uses: pvarki/config-ci-library/.github/actions/publish-image@main
        with:
          product: kraftwerk-helper
          component: tool
          dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          acr-repo: ${{ vars.ACR_REPO }}
          acr-username: ${{ vars.ACR_USERNAME }}
          acr-token: ${{ secrets.ACR_TOKEN }}
